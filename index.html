<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#006633">
  <meta name="description" content="The_complete Registered Medical Products Directory">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>THE CHEMIST-INDEX</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Tajawal:wght@300;400;500;700&display=swap">
  
  <!-- FULL DRIBBBLE-INSPIRED CSS -->
  <style>
    /* =============================
       GLOBAL VARIABLES & ROOT
    ============================= */
    :root {
      --primary: #006633;
      --primary-light: #00a86b;
      --secondary: #C8A951;
      --bg-gradient: linear-gradient(135deg, #006633, #00a86b);
      --bg-light: #f4f7f6;
      --card-bg: rgba(255, 255, 255, 0.95);
      --shadow-soft: 0 10px 25px rgba(0, 0, 0, 0.08);
      --radius: 16px;
      --transition: 0.25s ease;
      --font-primary: 'Tajawal', sans-serif;
      --font-secondary: 'Cairo', sans-serif;
    }

    /* =============================
       BODY & BASE
    ============================= */
    body {
      margin: 0;
      font-family: var(--font-primary);
      background: var(--bg-light);
      color: #1a1a1a;
      -webkit-font-smoothing: antialiased;
    }
    .hidden { display: none !important; }

    /* =============================
       SPLASH SCREEN
    ============================= */
    #splash {
      position: fixed; inset: 0;
      background: var(--bg-gradient);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      animation: splashFadeIn 0.8s forwards;
    }
    .splash-content {
      text-align: center;
      color: white;
      animation: contentSlideUp 0.8s ease forwards;
    }
    .splash-logo svg {
      width: 80px; height: 80px;
      margin-bottom: 12px;
      animation: rotateLogo 2s linear infinite;
    }
    .splash-title { font-size: 28px; font-weight: 700; }
    .splash-sub, .splash-sub-ar { font-size: 14px; margin: 2px 0; }
    .loader-bar {
      width: 180px; height: 6px;
      background: rgba(255,255,255,0.3);
      border-radius: 999px; overflow: hidden;
      margin: 0 auto 6px;
    }
    .loader-fill {
      width: 0%; height: 100%;
      background: var(--secondary);
      border-radius: 999px;
      transition: width 0.6s ease;
    }
    .loader-text { font-size: 12px; color: white; }

    @keyframes splashFadeIn { from{opacity:0;} to{opacity:1;} }
    @keyframes contentSlideUp { from{transform:translateY(40px);opacity:0;} to{transform:translateY(0);opacity:1;} }
    @keyframes rotateLogo { 0%{transform:rotate(0deg);} 100%{transform:rotate(360deg);} }

    /* =============================
       HEADER
    ============================= */
    .app-header {<div class="disclaimer">
  ⚠️ <strong>Notice:</strong> MedCheck is a simplified reference tool. 
  Some product data may be outdated or incomplete. 
  We are not responsible for errors, misprints, or product use decisions. 
  Always verify with official sources.
</div>
      background: var(--card-bg);
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #e0e0e0;
      box-shadow: var(--shadow-soft);
      position: sticky;
      top: 0;
      z-index: 50;
      border-radius: var(--radius) var(--radius) 0 0;
    }
    .header-title { font-weight:700; font-size:20px; }
    .header-sub { font-size:12px; color:#555; }

    /* =============================
       SEARCH BAR
    ============================= */
    .search-section { padding: 12px 16px; }
    .search-wrap {
      background:white;
      border-radius:999px;
      box-shadow: var(--shadow-soft);
      padding: 10px 14px; display:flex; align-items:center; gap:8px;
      transition: all var(--transition);
    }
    .search-wrap:focus-within { box-shadow:0 14px 30px rgba(0,0,0,0.12); }
    .search-input { flex:1; border:none; outline:none; font-size:14px; background:transparent; }
    .search-clear { border:none; background:transparent; font-size:14px; cursor:pointer; }

    /* =============================
       FILTER CHIPS
    ============================= */
    .filters-section { padding:8px 16px; overflow-x:auto; }
    .filters-scroll { display:flex; gap:8px; }
    .filter-btn {
      border-radius:999px; background:#eef3f1; padding:8px 14px;
      font-weight:500; border:none; font-size:13px; white-space:nowrap;
      transition:all var(--transition);
    }
    .filter-btn.active { background: var(--primary); color:white; }

    /* =============================
       STATS CARDS
    ============================= */
    .stats-row { display:flex; gap:12px; padding:12px 16px; overflow-x:auto; }
    .stat-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow-soft);
      padding:14px; min-width:120px; text-align:center;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }
    .stat-card:hover { transform:translateY(-4px); box-shadow:0 14px 30px rgba(0,0,0,0.12); }
    .stat-icon { font-size:20px; margin-bottom:6px; display:inline-block; padding:6px; border-radius:12px; background:#eef3f1; }
    .stat-val { font-weight:700; font-size:16px; }

    /* =============================
       PRODUCT GRID
    ============================= */
    .product-grid {
      display:grid; grid-template-columns:repeat(auto-fill, minmax(140px,1fr)); gap:12px; padding:12px 16px;
    }
    .product-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow-soft);
      padding:12px;
      display:flex; flex-direction:column; gap:6px;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }
    .product-card:hover { transform:translateY(-6px); box-shadow:0 14px 30px rgba(0,0,0,0.15); }
    .product-title { font-weight:600; font-size:14px; }
    .product-subtitle { font-size:12px; color:#555; }
    .price { font-weight:700; font-size:16px; color: var(--primary); }

    /* =============================
       MODAL
    ============================= */
    .modal-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,0.45);
      display:flex; justify-content:center; align-items:center; z-index:999;
      opacity:0; animation:fadeIn 0.3s forwards;
    }
    .modal-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      max-width:360px; width:90%;
      padding:16px; box-shadow:var(--shadow-soft);
      display:flex; flex-direction:column; gap:12px;
      transform:translateY(20px); animation:slideUp 0.3s forwards;
    }
    .modal-close { align-self:flex-end; border:none; background:transparent; font-size:16px; font-weight:700; cursor:pointer; }
    @keyframes fadeIn { to {opacity:1;} }
    @keyframes slideUp { to {transform:translateY(0);} }

    /* =============================
       BUTTONS
    ============================= */
    .footer-btn {
      background:#eef3f1; padding:10px 12px; border-radius:var(--radius); border:none;
      font-weight:600; font-size:14px; cursor:pointer;
    }
    .footer-btn.primary { background: var(--primary); color:white; }

    /* =============================
       RESPONSIVE
    ============================= */
    @media(max-width:480px){
      .product-grid { grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); }
      .stats-row { flex-wrap:nowrap; overflow-x:auto; }
    }
  </style>
</head>
<body>

</body>
</html>
